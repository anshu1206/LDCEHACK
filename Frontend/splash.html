<!DOCTYPE html>
<html lang="en">
<head>
    <title>Complaint AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
            position: relative;
            font-family: 'Orbitron', monospace;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px #00f5ff;
        }

        /* Animated Background Grid */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 245, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Particle System */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border-radius: 50%;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        /* Glitch Title */
        .title {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88, #ffaa00);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite, glitch 2s infinite, float 6s ease-in-out infinite;
            position: relative;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .title::before,
        .title::after {
            content: 'Complaint AI';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title::before {
            animation: glitchTop 1s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
        }

        .title::after {
            animation: glitchBottom 1.5s infinite;
            clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        @keyframes glitchTop {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, -2px); }
            20% { transform: translate(2px, 2px); }
            30% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
        }

        @keyframes glitchBottom {
            0%, 100% { transform: translate(0); }
            15% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            35% { transform: translate(2px, -2px); }
            45% { transform: translate(-2px, 2px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(5deg); }
        }

        /* Subtitle */
        .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #00f5ff;
            margin: 20px 0 40px;
            opacity: 0.9;
            animation: pulse 2s infinite;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 10px #00f5ff; }
            50% { opacity: 1; text-shadow: 0 0 30px #00f5ff, 0 0 40px #00f5ff; }
        }

        /* Advanced Loader */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px 0;
        }

        .matrix-loader {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .matrix-loader::before {
            content: 'LOADING';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: 700;
            color: #00ff88;
            letter-spacing: 2px;
            animation: matrix 2s infinite;
        }

        .ring {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 3px solid transparent;
            border-top: 3px solid #00f5ff;
            border-right: 3px solid #ff00ff;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .ring:nth-child(2) {
            width: 80px;
            height: 80px;
            border-top: 3px solid #00ff88;
            border-right: 3px solid #ffaa00;
            animation-direction: reverse;
            animation-duration: 1.5s;
            top: 10px;
            left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes matrix {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Stats Counter */
        .stats {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            font-family: 'Orbitron', monospace;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            animation: countUp 2s ease-out forwards;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar */
        .progress-container {
            width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px auto;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #00ff88);
            width: 0%;
            animation: progress 4.5s ease-out forwards;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 95%; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats { gap: 20px; }
            .stat-number { font-size: 1.5rem; }
        }
    </style>
</head>

<body>
    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>

    <!-- Background Grid -->
    <div class="grid"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1 class="title">Complaint AI</h1>
        <p class="subtitle">
            <i class="fas fa-brain"></i> Smart Complaint Classification & Resolution
            <i class="fas fa-bolt"></i>
        </p>
        
        <div class="loader-container">
            <div class="matrix-loader">
                <div class="ring"></div>
                <div class="ring"></div>
            </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" data-target="99">0</span>
                <span class="stat-label">Accuracy</span>
            </div>
            <div class="stat">
                <span class="stat-number" data-target="0.1">0</span>
                <span class="stat-label">Sec Response</span>
            </div>
            <div class="stat">
                <span class="stat-number" data-target="10K">0</span>
                <span class="stat-label">Complaints/Day</span>
            </div>
        </div>
    </div>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Particle System
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // Animated Counters
        function animateCounters() {
            const numbers = document.querySelectorAll('.stat-number');
            numbers.forEach(number => {
                const target = parseInt(number.getAttribute('data-target'));
                let current = 0;
                const increment = target / 50;
                const timer = setInterval(() => {
                    current += increment;
                    if (current >= target) {
                        current = target;
                        clearInterval(timer);
                    }
                    number.textContent = current.toLocaleString();
                }, 50);
            });
        }

        // Start animations after 500ms
        setTimeout(() => {
            animateCounters();
        }, 500);

        // Redirect after 5 seconds
        setTimeout(() => {
            window.location.href = "index.html";
        }, 5000);
    </script>
</body>
</html>
